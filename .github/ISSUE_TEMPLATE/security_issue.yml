name: 🔒 Security Concern
description: Report a security issue with Crawl4AI-MCP (non-critical vulnerabilities only)
title: "[SECURITY] "
labels: ["security", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        <div align="center">
        
        # 🔒 Security Concern
        
        ![Security Issue](https://img.shields.io/badge/Issue%20Type-Security-red?style=for-the-badge)
        
        </div>
        
        ---
        
        > **IMPORTANT:** For critical security vulnerabilities, please follow our [security policy](../SECURITY.md) to report privately rather than creating a public issue.
        >
        > Use this template only for lower-severity concerns, potential issues, or security improvements.

  - type: dropdown
    id: security_type
    attributes:
      label: 🛡️ Type of Security Concern
      description: What category best describes this security issue?
      options:
        - Access Control
        - Authentication
        - Crawl/Scraping Boundaries
        - Data Exposure
        - Input Validation
        - MCP Protocol Security
        - Dependency Vulnerability
        - Configuration Security
        - Rate Limiting
        - Browser/Rendering Security
        - Other (please specify)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 📝 Detailed Description
      description: Describe the security concern in detail. What specific aspect of security is at risk?
      placeholder: |
        Example: "The crawler's current implementation might inadvertently access sensitive areas of websites due to insufficient boundary checks when following links. This could potentially lead to..."
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: 💥 Potential Impact
      description: What is the potential negative impact if this security issue is not addressed?
      placeholder: |
        Example: "An attacker could potentially use the tool to access private areas of websites by crafting specific URLs to crawl, which could lead to..."
    validations:
      required: true
      
  - type: textarea
    id: reproduction
    attributes:
      label: 🔄 Steps to Reproduce (if applicable)
      description: If this is a reproducible issue, please provide steps to demonstrate it.
      placeholder: |
        Example:
        1. Configure the crawler with...
        2. Create a test site with...
        3. Attempt to crawl...
        4. Observe that the crawler accesses...
      render: markdown
      
  - type: textarea
    id: proposed_solution
    attributes:
      label: 🔧 Suggested Fix/Improvement
      description: If you have ideas on how to address this security concern, please share them.
      placeholder: |
        Example: "Implement stronger URL filtering before crawling by:
        1. Adding a configurable pattern-matching system for URL exclusions
        2. Implementing a robots.txt respect system that's enabled by default
        3. Adding rate limiting per domain"
      render: markdown

  - type: textarea
    id: additional_context
    attributes:
      label: 📎 Additional Context
      description: Add any other context, references, or resources about the security concern.
      render: markdown

  - type: checkboxes
    id: terms
    attributes:
      label: 🔍 Verification
      description: Please check the following items before submitting
      options:
        - label: I have checked that this security concern has not already been reported
          required: true
        - label: I have provided specific details rather than vague descriptions
          required: true
        - label: I understand that critical security vulnerabilities should be reported privately, not as GitHub issues
          required: true

  - type: markdown
    attributes:
      value: |
        ---
        
        <div align="center">
        
        ### Thank you for helping improve the security of Crawl4AI-MCP!
        
        </div> 