name: 🔄 Workflow Request
description: Request a new workflow or improvement to existing workflows
title: "[WORKFLOW] "
labels: ["workflow", "enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        <div align="center">
        
        # 🔄 Workflow Request
        
        ![Workflow Request](https://img.shields.io/badge/Request%20Type-Workflow-blue?style=for-the-badge)
        
        **Thank you for helping us improve Crawl4AI-MCP workflows!**
        
        </div>
        
        ---
        
        > **Goal:** Share your vision for new or improved workflows in Crawl4AI-MCP.

  - type: textarea
    id: description
    attributes:
      label: 📝 Workflow Description
      description: A clear and concise description of the workflow you're suggesting.
      placeholder: |
        Example: "Create a workflow for automatically validating MCP compliance of new tools before merging."
    validations:
      required: true

  - type: textarea
    id: current_workflow
    attributes:
      label: 🔍 Current Workflow (if applicable)
      description: Describe the current workflow and its limitations or pain points.
      placeholder: |
        Example: "Currently, MCP compliance is checked manually during code review, which is error-prone and time-consuming."
    validations:
      required: false

  - type: textarea
    id: proposed_solution
    attributes:
      label: 🌟 Proposed Solution
      description: Describe your proposed workflow in detail. How should it work?
      placeholder: |
        Example: "Implement a GitHub Action that:
        1. Runs on pull requests that modify files in the `/tools` directory
        2. Validates tool schemas against the MCP specification
        3. Checks parameter naming conventions
        4. Reports findings as PR comments"
      render: markdown
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: 🎯 Expected Impact
      description: What areas of the project would benefit from this workflow?
      multiple: true
      options:
        - Development Speed
        - Code Quality
        - User Experience
        - Documentation
        - Testing
        - MCP Compliance
        - Security
        - Other (please specify in additional context)
    validations:
      required: true

  - type: textarea
    id: additional_context
    attributes:
      label: 📎 Additional Context
      description: Add any other context, links to similar workflows in other projects, or examples.
      render: markdown

  - type: markdown
    attributes:
      value: |
        ---
        
        <div align="center">
        
        ### Thank you for your workflow suggestion!
        We appreciate your input in improving our development process.
        
        </div> 