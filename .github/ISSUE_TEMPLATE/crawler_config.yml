name: 🕸️ Crawler Configuration
description: Suggest improvements to crawler configuration options
title: "[CRAWLER CONFIG] "
labels: ["crawler", "enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        <div align="center">
        
        # 🕸️ Crawler Configuration Enhancement
        
        ![Crawler Config](https://img.shields.io/badge/Request%20Type-Crawler%20Config-green?style=for-the-badge)
        
        **Help us improve Crawl4AI-MCP's web crawler configuration!**
        
        </div>
        
        ---
        
        > **Goal:** Suggest improvements to how crawlers are configured for better performance, functionality, or compatibility.

  - type: dropdown
    id: crawler_type
    attributes:
      label: 🔍 Crawler Type
      description: Which crawler implementation would this configuration enhancement affect?
      options:
        - Basic Crawler (requests-based)
        - Browser Crawler (Playwright/headless browser)
        - Both/All Crawler Types
        - New Crawler Type (please specify)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 📝 Configuration Enhancement Description
      description: Describe the configuration option or enhancement you're suggesting.
      placeholder: |
        Example: "Add a new `retry_strategy` configuration option to specify how crawlers should handle failed requests. This would allow users to configure specific retry behavior (number of attempts, backoff strategy, conditions for retrying) rather than using the current fixed retry logic."
    validations:
      required: true

  - type: textarea
    id: current_limitations
    attributes:
      label: 🔍 Current Limitations
      description: What limitations of the current configuration options are you trying to address?
      placeholder: |
        Example: "Currently, the crawler has a fixed retry strategy (3 attempts with linear backoff) that cannot be customized. This is problematic for sites with specific rate limiting patterns or when crawling less reliable sources where more retries would be beneficial."
    validations:
      required: true

  - type: textarea
    id: proposed_solution
    attributes:
      label: 🌟 Proposed Configuration Solution
      description: Provide details of your proposed configuration enhancement.
      placeholder: |
        Example:
        
        Add a `retry_strategy` configuration with the following options:
        
        ```yaml
        crawler:
          retry_strategy:
            max_attempts: 5  # Maximum number of retry attempts
            backoff_factor: 2.0  # Exponential backoff factor
            backoff_max: 60  # Maximum backoff time in seconds
            retry_on_status_codes: [429, 500, 502, 503, 504]  # Status codes to retry on
            retry_on_exceptions: ["ConnectionError", "Timeout"]  # Exception types to retry on
        ```
        
        This would allow fine-grained control over retry behavior to handle different website requirements.
      render: markdown
    validations:
      required: true

  - type: textarea
    id: implementation_details
    attributes:
      label: 🔧 Implementation Details
      description: If you have ideas about how this could be implemented, please share them.
      placeholder: |
        Example: "The implementation could leverage existing retry libraries like 'tenacity' to handle the retry logic. The configuration would be parsed in the crawler's initialization and passed to the retry decorator. This would require modifying the BaseClient class to accept and use the retry configuration."
      render: markdown

  - type: textarea
    id: use_cases
    attributes:
      label: 📊 Use Cases
      description: What specific use cases would benefit from this configuration enhancement?
      placeholder: |
        Example use cases:
        1. **High-volume crawling:** Need to fine-tune retry strategies to avoid triggering anti-bot measures.
        2. **Crawling flaky APIs:** Some endpoints require more retries with longer backoffs.
        3. **Rate-limited sources:** Need to specifically retry on 429 errors with appropriate backoff.
        4. **Limited execution time:** In some environments, users need to limit retry attempts to meet time constraints.
      render: markdown
    validations:
      required: true

  - type: textarea
    id: alternatives_considered
    attributes:
      label: 🤔 Alternatives Considered
      description: Have you considered alternative approaches to solving this problem?
      placeholder: |
        Example: "I considered suggesting a simpler boolean option `aggressive_retries` that would use a predefined more aggressive strategy, but this wouldn't provide the flexibility needed for different scenarios."
      render: markdown

  - type: textarea
    id: additional_context
    attributes:
      label: 📎 Additional Context
      description: Add any other context or examples of similar configuration patterns in other tools.
      render: markdown

  - type: markdown
    attributes:
      value: |
        ---
        
        <div align="center">
        
        ### Thank you for helping improve Crawl4AI-MCP crawler configuration!
        Better configuration options help all users tailor the crawler to their needs.
        
        </div> 