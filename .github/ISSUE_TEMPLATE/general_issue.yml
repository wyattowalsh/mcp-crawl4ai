name: General Issue / Question
description: Use this for general questions, feedback, or issues not covered by other templates.
title: "[General] "
labels: ["question", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        <div align="center">
        
        # 📣 General Issue or Question
        
        ![General Issue](https://img.shields.io/badge/Type-General/Question-blue?style=for-the-badge)
        
        Thanks for reaching out! Use this form for questions, feedback, or issues that don't fit the Bug Report or Feature Request templates.
        
        **Before submitting:**
        *   ✅ **[Search existing issues](https://github.com/wyattowalsh/crawl4ai-mcp/issues)** to avoid duplicates.
        *   ✅ **[Check the documentation](https://github.com/wyattowalsh/crawl4ai-mcp/blob/main/README.md)** for potential answers.
        *   ✅ **[Look through discussions](https://github.com/wyattowalsh/crawl4ai-mcp/discussions)** for related topics.

        </div>
        
        ---
  - type: dropdown
    id: category
    attributes:
      label: 📊 Category
      description: What is the primary focus of this submission?
      options:
        - General Question
        - Feedback/Suggestion (Not a full feature request)
        - Documentation Issue/Question
        - Configuration Help
        - Installation Problem
        - Usage Question
        - Performance Concern (Not a specific bug)
        - Security Question (Not a vulnerability report - see SECURITY.md)
        - Other
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: 🔥 Perceived Severity / Impact
      description: How significantly does this affect you or the project?
      options:
        - High - Major impediment or question about core functionality
        - Medium - Moderate inconvenience or important clarification needed
        - Low - Minor issue, suggestion, or general question
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: 📝 Detailed Description
      description: Please describe your question, feedback, or issue in detail.
      placeholder: Provide context, what you're trying to achieve, and any relevant background information.
      render: markdown
    validations:
      required: true
  - type: textarea
    id: expected_behavior
    attributes:
      label: 🤔 Expected Outcome (if applicable)
      description: If reporting an issue or asking about behavior, what did you expect to happen?
      placeholder: Describe the ideal behavior or the answer you were hoping to find.
      render: markdown
  - type: textarea
    id: environment
    attributes:
      label: 🖥️ Environment Details (if relevant)
      description: |
        If this relates to specific behavior you're observing, please provide environment details.
        Run commands like `python --version`, `pip show crawl4ai-mcp`, `uname -a` (Linux/macOS) or `systeminfo` (Windows).
      value: |
        | Component            | Details                                |
        | :------------------- | :------------------------------------- |
        | OS                   | <!-- e.g., macOS 14.5, Ubuntu 22.04 --> |
        | Python Version       | <!-- e.g., 3.14.0 -->                  |
        | crawl4ai-mcp Version | <!-- e.g., 0.3.0 -->                   |
        | Installation Method  | <!-- e.g., pip, source, Docker -->      |
        | MCP Transport        | <!-- e.g., STDIO, HTTP -->               |
        | Browser (if used)    | <!-- e.g., Chromium 125 -->           |
        | Client Application   | <!-- e.g., Claude Desktop -->         |
      render: markdown
  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: 👟 Steps (if applicable)
      description: If reporting unexpected behavior, list the steps to reproduce it.
      placeholder: |
        1. Configure the server with ...
        2. Run the command ...
        3. Observe that ...
      render: markdown
  - type: textarea
    id: additional_context
    attributes:
      label: 📎 Additional Context
      description: Add any other context, logs, screenshots, or links that might be helpful.
      placeholder: | 
        Consider linking to gists (https://gist.github.com) for large log files.
      render: markdown
  - type: input
    id: related_items
    attributes:
      label: 🔗 Related Issues/Discussions/PRs
      description: Link any related items. (e.g., #123, Discussion #45)
      placeholder: "#123, https://github.com/wyattowalsh/crawl4ai-mcp/discussions/45"
  - type: checkboxes
    id: prerequisites
    attributes:
      label: ✅ Prerequisites Check
      description: Please confirm you've checked these common resources.
      options:
        - label: I have searched existing [issues](https://github.com/wyattowalsh/crawl4ai-mcp/issues) and [discussions](https://github.com/wyattowalsh/crawl4ai-mcp/discussions).
          required: true
        - label: I have consulted the project [README](https://github.com/wyattowalsh/crawl4ai-mcp/blob/main/README.md) and relevant documentation.
          required: true
  - type: checkboxes
    id: terms
    attributes:
      label: 📜 Community Guidelines
      description: By submitting this issue, you agree to follow our [Contribution Guidelines](https://github.com/wyattowalsh/crawl4ai-mcp/blob/main/.github/CONTRIBUTING.md).
      options:
        - label: I agree to follow this project's contribution and community guidelines.
          required: true
  - type: markdown
    attributes:
      value: |
        ---
        
        <div align="center">
        
        **Thank you for your input!**
        
        We value your questions and feedback.
        
        </div> 
