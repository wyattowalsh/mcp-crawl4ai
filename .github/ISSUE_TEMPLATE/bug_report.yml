name: 🐞 Bug Report
description: Create a report to help us improve crawl4ai-mcp
title: "[BUG] "
labels: ["bug", "triage"]
assignees: ""
body:
  - type: markdown
    attributes:
      value: |
        <div align="center">

        # 🐞 Bug Report

        **Thank you for helping us improve Crawl4AI-MCP!**

        ![Bug Report Banner](https://img.shields.io/badge/Report%20Type-Bug-red?style=for-the-badge)
        </div>

        ---

        > **Important:** Before submitting, please [search existing issues](https://github.com/wyattowalsh/crawl4ai-mcp/issues?q=is%3Aissue+label%3Abug) to ensure this bug hasn't already been reported.

  - type: textarea
    id: description
    attributes:
      label: 🔍 Bug Description
      description: A clear and concise description of what the bug is. Be specific about what functionality is affected.
      placeholder: |
        Example: "The `crawl_url` tool fails with a timeout error when attempting to crawl sites that require heavy JavaScript rendering, even with the browser engine enabled."
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: 🔄 Steps To Reproduce
      description: Provide detailed, step-by-step instructions to reproduce the behavior. Use numbered lists.
      placeholder: |
        1. Start the MCP server: `crawl4ai-mcp serve --transport http`
        2. Make a POST request to `http://localhost:8000/mcp/v1/tools` with the following payload:
           ```json
           {
             "name": "crawl_url",
             "parameters": { ... }
           }
           ```
        3. Observe the error...
      render: markdown
    validations:
      required: true

  - type: textarea
    id: code-example
    attributes:
      label: 💻 Code Example (If Applicable)
      description: If possible, provide a *minimal*, self-contained code snippet that reliably reproduces the issue.
      placeholder: |
        ```python
        # Add your code example here
        import requests
        try:
            # ... code to trigger the bug ...
        except Exception as e:
            print(f"Error: {e}")
        ```
      render: python

  - type: textarea
    id: expected-vs-actual
    attributes:
      label: ✅ Expected Behavior vs. ❌ Actual Behavior
      description: Describe what should happen versus what actually happens. Include error messages or deviations.
      placeholder: |
        **Expected:** The `crawl_url` tool should successfully render the page and return the extracted content.
        **Actual:** The tool execution hangs and eventually returns a timeout error.
      render: markdown
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 📋 Error Messages & Logs
      description: Paste any relevant error messages, stack traces, or log snippets below. Use code blocks for formatting. Include timestamps if possible.
      placeholder: |
        ```log
        # Paste relevant logs here
        2024-07-29 10:15:30 ERROR [crawl4ai_mcp.crawlers.browser] Playwright execution failed...
        ```

  - type: textarea
    id: environment
    attributes:
      label: 🖥️ Environment Details
      description: Please provide details about the environment where you encountered the bug. Run `python --version`, `pip show crawl4ai-mcp`, etc.
      value: |
        | Component            | Details                                     |
        | :------------------- | :------------------------------------------ |
        | OS                   | <!-- e.g., macOS 14.5, Ubuntu 22.04 LTS --> |
        | Python Version       | <!-- e.g., 3.14.0 -->                       |
        | crawl4ai-mcp Version | <!-- e.g., 0.2.1 -->                        |
        | Installation Method  | <!-- e.g., pip, source, docker -->           |
        | MCP Transport Used   | <!-- e.g., STDIO, HTTP/SSE, WebSocket -->    |
        | Browser (if relevant)| <!-- e.g., Chromium 125, Firefox 126 -->    |
        | Client Application   | <!-- e.g., Claude Desktop, custom client --> |
      render: markdown
    validations:
      required: true

  - type: textarea
    id: mcp-info
    attributes:
      label: 🔌 MCP-Specific Information (If Applicable)
      description: If the issue relates to MCP protocol implementation, provide details here.
      placeholder: |
        - **MCP Tool/Resource Affected:** e.g. `crawl_url`
        - **Transport Configuration:** Any specific settings used?
        - **Authentication Method:** e.g., API key, none
      render: markdown

  - type: textarea
    id: attempted-solutions
    attributes:
      label: 🔧 Attempted Solutions
      description: Describe any workarounds or solutions you've tried, even if they were unsuccessful.
      placeholder: "e.g., Tried increasing the timeout, disabling JavaScript..."

  - type: textarea
    id: additional-context
    attributes:
      label: 📎 Additional Context
      description: Add any other context, links, or screenshots about the problem here. Consider linking to gists (https://gist.github.com) for large log files.

  - type: markdown
    attributes:
      value: |
        ---

        <div align="center">

        ### Thank you for taking the time to file a detailed bug report! 🙏
        This information helps us improve Crawl4AI-MCP for everyone.

        </div> 