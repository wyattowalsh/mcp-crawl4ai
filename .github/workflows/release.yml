name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libxml2-dev libxslt-dev
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install
      - name: Install dependencies
        run: uv sync
      - name: Run tests
        run: uv run pytest --cov=crawl4ai_mcp --cov-report=term-missing
      - name: Build package
        run: uv build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI (trusted publisher)
        id: publish_oidc
        continue-on-error: true
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
      - name: Publish to PyPI (API token fallback)
        id: publish_token
        if: ${{ steps.publish_oidc.outcome == 'failure' && secrets.PYPI_API_TOKEN != '' }}
        continue-on-error: true
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
      - name: Ensure PyPI publish succeeded
        if: ${{ steps.publish_oidc.outcome == 'failure' && (secrets.PYPI_API_TOKEN == '' || steps.publish_token.outcome == 'failure') }}
        env:
          HAS_PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN != '' }}
        run: |
          if [ "$HAS_PYPI_API_TOKEN" != "true" ]; then
            echo "::error::Trusted Publisher (OIDC) publish failed and PYPI_API_TOKEN is not set. Configure PyPI trusted publishing or add PYPI_API_TOKEN secret."
          else
            echo "::error::Trusted Publisher (OIDC) publish failed and PYPI_API_TOKEN fallback also failed. Check publish logs and token permissions."
          fi
          exit 1

  github-release:
    name: GitHub Release
    needs: [build, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
